<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nugelma | Catalogue Premium</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="top-header">
    <div class="logo">NUGELMA</div>
    <button id="cartButton" class="cart-button">
      🛒 <span id="cartCount">0</span>
      <strong id="cartTotal">0 FCFA</strong>
    </button>
  </header>

  <section class="hero">
    <div class="hero-content">
      <p class="hero-label">Pâtisserie • Décoration • Marché frais</p>
      <h1>L’excellence Nugelma, livrée avec soin.</h1>
      <p class="hero-text">Commandez vos produits premium et validez votre achat sur WhatsApp.</p>
    </div>
  </section>

  <main>
    <section class="filters">
      <button class="filter-btn active" data-category="all">Tout</button>
      <button class="filter-btn" data-category="Pâtisserie">Pâtisserie</button>
      <button class="filter-btn" data-category="Décoration">Décoration</button>
      <button class="filter-btn" data-category="Marché frais">Marché frais</button>
    </section>

    <section id="productsGrid" class="products-grid"></section>
  </main>

  <div id="cartModal" class="modal hidden">
    <div class="modal-content">
      <button id="closeModal" class="close-btn">×</button>

      <h2>Votre commande</h2>

      <div id="cartItems"></div>

      <div class="cart-summary">
        <strong>Total :</strong>
        <span id="modalTotal">0 FCFA</span>
      </div>

      <p class="payment-note">
        Validation immédiate après paiement Wave/OM pour garantir la fraîcheur de vos produits.
      </p>

      <button id="whatsappButton" class="whatsapp-btn">
        Commander sur WhatsApp
      </button>

      <button id="clearCartButton" class="clear-btn">
        Vider le panier
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
