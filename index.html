<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nugelma | Boutique</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1 class="logo">NUGELMA</h1>
    </header>

    <div class="filter-wrapper">
        <nav class="categories">
            <button class="cat-btn active" onclick="filterCat('all', this)">Tous</button>
            <button class="cat-btn" onclick="filterCat('Pâtisserie', this)">Pâtisserie</button>
            <button class="cat-btn" onclick="filterCat('Frais', this)">Frais</button>
            <button class="cat-btn" onclick="filterCat('Maison', this)">Maison</button>
        </nav>
    </div>

    <main class="products-grid" id="catalog"></main>

    <div class="cart-float">
        <div class="cart-total">
            <span id="count">0</span> articles | <span id="total">0</span> FCFA
        </div>
        <button class="btn-whatsapp" onclick="sendOrder()">Commander</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
