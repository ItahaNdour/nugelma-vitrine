<div id="thankYouModal" class="modal hidden">
  <div class="thankyou-content payment-priority">
    <h2>Paiement de validation</h2>

    <p class="payment-intro">
      Votre commande est prête. Pour la valider, effectuez votre paiement Wave/OM, puis envoyez la preuve sur WhatsApp.
    </p>

    <div class="payment-numbers big">
      <div class="payment-line">
        <div>
          <span>Wave</span>
          <strong id="waveNumber">+221 77 000 00 00</strong>
        </div>
        <button class="copy-btn" data-copy="+221770000000">📋 Copier</button>
      </div>

      <div class="payment-line">
        <div>
          <span>Orange Money</span>
          <strong id="omNumber">+221 78 000 00 00</strong>
        </div>
        <button class="copy-btn" data-copy="+221780000000">📋 Copier</button>
      </div>
    </div>

    <p class="payment-reminder">
      Après paiement, cliquez ci-dessous pour envoyer votre commande et votre capture d’écran sur WhatsApp.
    </p>

    <button id="continueWhatsappButton" class="whatsapp-btn">
      J’ai payé, j’envoie ma preuve sur WhatsApp
    </button>

    <button id="closeThankYouModal" class="clear-btn">
      Annuler
    </button>
  </div>
</div>
