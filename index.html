<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nugelma | Showroom Digital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-placeholder">NUGELMA</div>
        </header>

    <section class="hero">
        <h2>L'excellence Nugelma, directement chez vous.</h2>
        <p>Une expérience sensorielle unique à Dakar</p>
    </section>

    <nav class="filter-bar">
        <button class="cat-btn active" onclick="filterCat('all', this)">Tous</button>
        <button class="cat-btn" onclick="filterCat('Pâtisserie', this)">Pâtisserie</button>
        <button class="cat-btn" onclick="filterCat('Frais', this)">Frais</button>
        <button class="cat-btn" onclick="filterCat('Maison', this)">Maison</button>
    </nav>

    <main class="catalog" id="catalog"></main>

    <div class="cart-float">
        <div class="total-box">
            <span id="cart-count">0</span> ARTICLES | <span id="cart-total">0</span> FCFA
        </div>
        <button class="checkout-btn" onclick="processOrder(this)">
            Commander sur WhatsApp
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
