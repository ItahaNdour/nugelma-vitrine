<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nugelma | Showroom Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-sans { font-family: 'Montserrat', sans-serif; }
        .product-card:hover .add-overlay { opacity: 1; }
        /* Animation pour le panier */
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.4s ease-out; }
    </style>
</head>
<body class="bg-[#FAFAFA] font-sans text-[#4A4A4A]">

    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-md z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="text-2xl font-serif font-bold tracking-tighter text-[#1A1A1A]">NUGELMA</div>
            <div class="relative">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#1A1A1A]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
                <span id="cart-badge" class="absolute -top-2 -right-2 bg-[#D4AF37] text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
            </div>
        </div>
    </nav>

    <section class="relative h-[50vh] flex items-center justify-center overflow-hidden mt-16">
        <img src="https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?auto=format&fit=crop&w=1500&q=80" class="absolute w-full h-full object-cover" alt="Hero">
        <div class="absolute inset-0 bg-black/40"></div>
        <div class="relative text-center text-white px-4">
            <h1 class="text-4xl md:text-5xl font-serif mb-4">L'excellence Nugelma</h1>
            <p class="text-lg font-light tracking-wide">Directement de notre atelier à votre table.</p>
        </div>
    </section>

    <div class="sticky top-16 bg-[#FAFAFA] z-40 py-6">
        <div class="flex gap-4 overflow-x-auto px-4 justify-start md:justify-center no-scrollbar">
            <button onclick="filter('all', this)" class="filter-btn active px-6 py-2 rounded-full border border-[#1A1A1A] bg-[#1A1A1A] text-white text-xs font-semibold uppercase tracking-widest transition-all">Tous</button>
            <button onclick="filter('Pâtisserie', this)" class="filter-btn px-6 py-2 rounded-full border border-gray-200 bg-white text-[#1A1A1A] text-xs font-semibold uppercase tracking-widest hover:border-[#1A1A1A] transition-all">Pâtisserie</button>
            <button onclick="filter('Frais', this)" class="filter-btn px-6 py-2 rounded-full border border-gray-200 bg-white text-[#1A1A1A] text-xs font-semibold uppercase tracking-widest hover:border-[#1A1A1A] transition-all">Frais</button>
            <button onclick="filter('Maison', this)" class="filter-btn px-6 py-2 rounded-full border border-gray-200 bg-white text-[#1A1A1A] text-xs font-semibold uppercase tracking-widest hover:border-[#1A1A1A] transition-all">Maison</button>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 pb-32">
        <div id="catalog" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="cart-bar" class="fixed bottom-6 left-4 right-4 md:left-auto md:right-8 md:w-96 bg-[#1A1A1A] text-white p-5 rounded-2xl shadow-2xl z-50 transform translate-y-full transition-transform duration-500 hidden">
        <div class="flex justify-between items-center mb-4">
            <span class="text-sm font-semibold uppercase tracking-widest text-gray-400">Votre Sélection</span>
            <span id="items-count" class="text-xs bg-[#D4AF37] px-2 py-0.5 rounded">0 articles</span>
        </div>
        <div class="flex justify-between items-end mb-6">
            <span class="text-gray-400 text-xs">Total estimé</span>
            <span id="total-price" class="text-2xl font-serif text-[#D4AF37]">0 FCFA</span>
        </div>
        <button onclick="sendToWA()" class="w-full bg-[#D4AF37] hover:bg-[#b8962d] py-4 rounded-xl font-bold uppercase text-xs tracking-widest transition-all flex items-center justify-center gap-3">
            <span>Confirmer sur WhatsApp</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
            </svg>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
