<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nugelma | Vitrine-Catalogue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">NUGELMA</div>
    </header>

    <nav class="categories" id="category-bar">
        <button class="cat-btn active" data-cat="all">Tous</button>
        <button class="cat-btn" data-cat="Pâtisserie">Pâtisserie</button>
        <button class="cat-btn" data-cat="Frais">Frais</button>
        <button class="cat-btn" data-cat="Maison">Maison</button>
    </nav>

    <main class="catalog" id="catalog-container">
        </main>

    <div class="cart-bar">
        <div class="cart-info">
            <span id="cart-count">0</span> article(s) | 
            <strong><span id="total-price">0</span> FCFA</strong>
        </div>
        <button class="checkout-btn" id="whatsapp-btn">Commander sur WhatsApp</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
